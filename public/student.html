<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>学生匿名评分</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div>
        <h1>课堂汇报匿名评分</h1>
        <p class="subtitle">请选择汇报小组，并提交 0-10 的整数分。每台设备对同一小组再次提交会更新自己的评分。</p>
      </div>
      <span class="status"><span class="dot"></span>匿名提交</span>
    </header>

    <div class="layout">
      <section class="panel">
        <h2 class="section-title">
          <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M4 4h16a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2H8.7l-4.1 2.7A1 1 0 0 1 3 19.9V6a2 2 0 0 1 2-2Zm3 5v2h10V9H7Zm0 4v2h7v-2H7Z"/></svg>
          给汇报小组打分
        </h2>

        <form id="scoreForm">
          <div class="form-grid">
            <label>
              <span class="field-label">汇报小组</span>
              <select id="groupName" required>
                <option value="第 1 小组">第 1 小组</option>
                <option value="第 2 小组">第 2 小组</option>
                <option value="第 3 小组">第 3 小组</option>
                <option value="第 4 小组">第 4 小组</option>
                <option value="第 5 小组">第 5 小组</option>
                <option value="第 6 小组">第 6 小组</option>
                <option value="第 7 小组">第 7 小组</option>
                <option value="第 8 小组">第 8 小组</option>
              </select>
            </label>
            <label>
              <span class="field-label">投票方式</span>
              <input type="text" value="匿名投票" disabled>
            </label>
          </div>

          <div class="score-control">
            <label class="range-wrap">
              <span class="field-label">本次评分</span>
              <input id="scoreRange" type="range" min="0" max="10" step="1" value="8">
              <span class="scale"><span>0</span><span>5</span><span>10</span></span>
            </label>
            <label>
              <span class="field-label">分数</span>
              <input id="scoreNumber" type="number" min="0" max="10" step="1" value="8">
            </label>
          </div>

          <div class="actions">
            <button class="btn" type="submit">提交评分</button>
          </div>
        </form>
      </section>

      <aside class="rubric" aria-label="评分标准">
        <h2>
          <svg class="icon" viewBox="0 0 24 24" aria-hidden="true"><path fill="currentColor" d="M7 3h10v3h4v2a6 6 0 0 1-6 6h-.2A5 5 0 0 1 13 16.6V19h4v2H7v-2h4v-2.4A5 5 0 0 1 9.2 14H9a6 6 0 0 1-6-6V6h4V3Z"/></svg>
          评分标准（总分10分）
        </h2>
        <div class="rubric-list">
          <article class="rubric-item"><svg class="icon" viewBox="0 0 24 24"><path fill="currentColor" d="M4 5h7a3 3 0 0 1 3 3v11a3 3 0 0 0-3-3H4V5Zm16 0h-5a4.8 4.8 0 0 0-2 .4A5 5 0 0 1 16 8v8h4V5Z"/></svg><div><h3>内容准确性（4分）</h3><p>理论与方法讲解准确深入，无明显错误</p></div></article>
          <article class="rubric-item"><svg class="icon" viewBox="0 0 24 24"><path fill="currentColor" d="M3 5h18v11H8l-5 3V5Zm4 4v4h2V9H7Zm4 0v4h2V9h-2Zm4 0v4h2V9h-2Z"/></svg><div><h3>表达清晰度（3分）</h3><p>逻辑清晰，语言流畅，PPT制作精良美观</p></div></article>
          <article class="rubric-item"><svg class="icon" viewBox="0 0 24 24"><path fill="currentColor" d="M16 11a4 4 0 1 0-4-4 4 4 0 0 0 4 4ZM3 20a7 7 0 0 1 13.3-3H21V4h2v15h-7.7A6.9 6.9 0 0 0 10 17a6.9 6.9 0 0 0-5.8 3H3Z"/></svg><div><h3>团队协作（2分）</h3><p>分工明确，配合默契，全员参与</p></div></article>
          <article class="rubric-item"><svg class="icon" viewBox="0 0 24 24"><path fill="currentColor" d="M4 4h16v12H9l-5 4V4Zm6 3-.3 2H7v2h2.4L9 14h2l.4-3h2.2l-.4 3h2l.4-3H18V9h-2.1l.3-2h-2l-.3 2h-2.2l.3-2h-2Z"/></svg><div><h3>互动与应答（1分）</h3><p>积极准确回应老师和同学的提问</p></div></article>
        </div>
      </aside>
    </div>
  </main>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script>
    const form = document.querySelector("#scoreForm");
    const groupName = document.querySelector("#groupName");
    const scoreRange = document.querySelector("#scoreRange");
    const scoreNumber = document.querySelector("#scoreNumber");
    const toast = document.querySelector("#toast");
    const voterKey = "classScoreAnonymousVoterId";

    if (!localStorage.getItem(voterKey)) {
      localStorage.setItem(voterKey, crypto.randomUUID ? crypto.randomUUID() : `${Date.now()}-${Math.random()}`);
    }

    scoreRange.addEventListener("input", () => {
      scoreNumber.value = scoreRange.value;
    });

    scoreNumber.addEventListener("input", () => {
      const score = normalizeScore(scoreNumber.value);
      scoreNumber.value = score;
      scoreRange.value = score;
    });

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      const score = normalizeScore(scoreNumber.value);
      const response = await fetch("/api/votes", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          group: groupName.value,
          score,
          voterId: localStorage.getItem(voterKey)
        })
      });
      const result = await response.json();
      showToast(result.error || (result.updated ? "已更新你的匿名评分。" : "匿名评分已提交。"));
    });

    function normalizeScore(value) {
      const number = Number.parseInt(value, 10);
      if (Number.isNaN(number)) return 0;
      return Math.min(10, Math.max(0, number));
    }

    function showToast(message) {
      toast.textContent = message;
      toast.classList.add("show");
      window.clearTimeout(showToast.timer);
      showToast.timer = window.setTimeout(() => toast.classList.remove("show"), 1800);
    }
  </script>
</body>
</html>
